<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexConnect - Search Results</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">Lex<span>Connect</span></a>
            <div class="search-bar-small">
                <input type="text" id="searchInput" placeholder="Search name or specialty..." onkeyup="filterLawyers()">
            </div>
        </div>
    </nav>

    <div class="container main-layout">
        
        <aside class="sidebar">
            <div class="filter-group">
    <h3>Category of Help</h3>
    <label>
        <input type="checkbox" class="cat-check" value="Family Law" onclick="filterLawyers()"> Family Law
    </label>
    <label>
        <input type="checkbox" class="cat-check" value="Corporate Law" onclick="filterLawyers()"> Corporate Law
    </label>
    <label>
        <input type="checkbox" class="cat-check" value="Criminal Defense" onclick="filterLawyers()"> Criminal Defense
    </label>
    <label>
        <input type="checkbox" class="cat-check" value="Real Estate" onclick="filterLawyers()"> Real Estate
    </label>
    <label>
        <input type="checkbox" class="cat-check" value="Intellectual Property" onclick="filterLawyers()"> Intellectual Property
    </label>
</div>

            <div class="filter-group">
                <h3>Preferences</h3>
                <label>
                    <input type="checkbox" id="verifiedCheck" onclick="filterLawyers()"> Verified Only
                </label>
                <label>
                    <input type="checkbox" id="expCheck" onclick="filterLawyers()"> 10+ Years Exp.
                </label>
            </div>
        </aside>

        <main class="results-list" id="lawyer-container">
            </main>
    </div>

    <script src="lawyers_data.js"></script>
    <script src="list.js"></script>

</body>
</html>
