<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - LexConnect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">Lex<span>Connect</span></a>
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </nav>

    <div class="login-wrapper">
        <div class="login-container">
            
            <div class="login-left">
                <div class="overlay">
                    <h2>Welcome Back</h2>
                    <p>Access top-rated lawyers, manage your cases, and get legal advice securely.</p>
                </div>
            </div>

            <div class="login-right">
                
                <div class="form-toggle">
                    <button id="loginBtn" class="active" onclick="showLogin()">Log In</button>
                    <button id="signupBtn" onclick="showSignup()">Sign Up</button>
                </div>

                <form id="loginForm" class="auth-form">
                    <h3>Client Login</h3>
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="Enter your email" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="Enter password" required>
                    </div>
                    <div class="form-actions">
                        <label><input type="checkbox"> Remember me</label>
                        <a href="#" class="forgot-pass">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Log In</button>
                </form>

                <form id="signupForm" class="auth-form" style="display: none;">
                    <h3>Create Account</h3>
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="John Doe" required>
                    </div>
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="Enter your email" required>
                    </div>
                    <div class="input-group">
                        <label>Create Password</label>
                        <input type="password" placeholder="Create a strong password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
                    
                    <p class="terms-text">By signing up, you agree to our Terms & Privacy Policy.</p>
                </form>

            </div>
        </div>
    </div>

    <script>
        // --- 1. TOGGLE LOGIC ---
        const loginForm = document.getElementById("loginForm");
        const signupForm = document.getElementById("signupForm");
        const loginBtn = document.getElementById("loginBtn");
        const signupBtn = document.getElementById("signupBtn");

        function showLogin() {
            loginForm.style.display = "block";
            signupForm.style.display = "none";
            loginBtn.classList.add("active");
            signupBtn.classList.remove("active");
        }

        function showSignup() {
            loginForm.style.display = "none";
            signupForm.style.display = "block";
            loginBtn.classList.remove("active");
            signupBtn.classList.add("active");
        }

        // --- 2. STANDARD LOGIN SIMULATION ---
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault(); // Stop page from reloading
            const btn = loginForm.querySelector('button[type="submit"]');
            btn.innerHTML = 'Logging in...';
            
            setTimeout(() => {
                alert("Welcome back! You are now logged in.");
                window.location.href = "index.html"; 
            }, 1000);
        });

        // --- 3. SIGNUP SIMULATION ---
        signupForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = signupForm.querySelector('button[type="submit"]');
            btn.innerHTML = 'Creating Account...';

            setTimeout(() => {
                alert("Account created successfully! Please log in.");
                showLogin(); // Switch to login view
                btn.innerHTML = 'Create Account'; // Reset button text
            }, 1000);
        });
    </script>

</body>
</html>
